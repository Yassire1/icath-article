# Active TSFM models for this benchmark (3 open-source TSFMs + 1 supervised baseline)
# Removed from scope: Sundial (limited public access), Time-MoE (implementation issues),
# TimeGPT (closed API, non-reproducible)

tsfm_models:
  moment:
    name: "MOMENT"
    active: true
    type: "foundation"
    hub_id: "AutonLab/MOMENT-1-large"
    paper: "arXiv:2402.03885"
    parameters: "385M"
    max_context: 512
    capabilities:
      multivariate: true
      probabilistic: true
      zero_shot: true
      fine_tunable: true
    tasks:
      - "forecasting"
      - "anomaly_detection"
      - "classification"

  chronos:
    name: "Chronos"
    active: true
    type: "foundation"
    hub_id: "amazon/chronos-t5-large"
    paper: "arXiv:2403.07815"
    parameters: "710M"
    max_context: 512
    capabilities:
      multivariate: false
      probabilistic: true
      zero_shot: true
      fine_tunable: false
    tasks:
      - "forecasting"

  lag_llama:
    name: "Lag-Llama"
    active: true
    type: "foundation"
    hub_id: "time-series-foundation-models/Lag-Llama"
    paper: "arXiv:2310.08278"
    parameters: "7M"
    max_context: 32
    capabilities:
      multivariate: false
      probabilistic: true
      zero_shot: true
      fine_tunable: true
    tasks:
      - "forecasting"
    tasks:
      - "forecasting"

  lag_llama:
    name: "Lag-Llama"
    type: "foundation"
    hub_id: "time-series-foundation-models/Lag-Llama"
    paper: "arXiv:2310.08278"
    parameters: "7M"
    max_context: 32
    capabilities:
      multivariate: false
      probabilistic: true
      zero_shot: true
      fine_tunable: true
    tasks:
      - "forecasting"

baseline_models:
  patchtst:
    name: "PatchTST"
    active: true
    type: "baseline"
    paper: "ICLR 2023"
    framework: "neuralforecast"
    config:
      input_size: 512
      h: 96
      patch_len: 16
      stride: 8
      hidden_size: 128
      n_heads: 16
      e_layers: 3
      d_ff: 256
      dropout: 0.2
      learning_rate: 1e-4
      max_steps: 1000
      batch_size: 32
